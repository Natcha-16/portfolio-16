<style>
    /* ===========================
   Professional Sakura Effect
=========================== */

.sakura{
    position:fixed;
    top:-60px;
    width:18px;
    height:18px;

    background:linear-gradient(135deg,#ffd1dc,#ff9ec7);

    border-radius:60% 40% 60% 40%;

    pointer-events:none;
    user-select:none;

    box-shadow:
        0 0 10px rgba(255,170,200,.6),
        0 0 20px rgba(255,170,200,.35);

    z-index:3;

    animation:fall linear forwards;
}

.sakura::before{
    content:"";
    position:absolute;

    width:18px;
    height:18px;

    background:inherit;

    border-radius:60% 40% 60% 40%;

    transform:rotate(55deg);
}

@keyframes fall{

    0%{
        transform:
            translateY(-50px)
            translateX(0)
            rotate(0deg);

        opacity:1;
    }

    20%{
        transform:
            translateY(20vh)
            translateX(-40px)
            rotate(120deg);
    }

    40%{
        transform:
            translateY(40vh)
            translateX(40px)
            rotate(240deg);
    }

    60%{
        transform:
            translateY(60vh)
            translateX(-35px)
            rotate(360deg);
    }

    80%{
        transform:
            translateY(80vh)
            translateX(35px)
            rotate(520deg);
    }

    100%{
        transform:
            translateY(calc(100vh + 100px))
            translateX(-20px)
            rotate(720deg);

        opacity:0;
    }

}

    margin:0;

.back-btn{

    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#cc7188;
}
</style>

<script>

/* ===== Professional Sakura ===== */

function createSakura(){

    const petal=document.createElement("div");

    petal.className="sakura";

    petal.style.left=Math.random()*window.innerWidth+"px";

    petal.style.width=(12+Math.random()*12)+"px";
    petal.style.height=petal.style.width;

    petal.style.opacity=.5+Math.random()*.5;

    petal.style.animationDuration=
        (8+Math.random()*6)+"s";

    document.body.appendChild(petal);

    setTimeout(()=>{
        petal.remove();
    },15000);

}

setInterval(createSakura,220);

</script>
