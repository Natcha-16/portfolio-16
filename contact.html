<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me 📱</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI','Kanit',sans-serif;
    background:linear-gradient(135deg,#FFF5F5,#FFE4EC);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:90%;
    max-width:420px;
    background:#fff;
    border-radius:25px;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,.12);
    text-align:center;
}

h1{
    color:#E18AA0;
    margin-bottom:25px;
}

.contact-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px;
    margin:12px 0;
    background:#FFF5F5;
    border-radius:15px;
    transition:.3s;
}

.contact-item:hover{
    background:#FFE6EC;
    transform:translateY(-3px);
}

.contact-item span{
    font-size:24px;
}

.contact-item a{
    color:#444;
    text-decoration:none;
}

.contact-item a:hover{
    color:#E18AA0;
}

.back-btn{
    display:block;
    margin-top:25px;
    background:#E18AA0;
    color:white;
    padding:14px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#cc7188;
}
</style>

</head>

<body>

<div class="card">

<h1>📱 ช่องทางการติดต่อ</h1>

<div class="contact-item">
    <span>📞</span>
    <div>
        <strong>เบอร์โทร</strong><br>
        <a href="tel:09XXXXXXXX">09X-XXXXXXX</a>
    </div>
</div>

<div class="contact-item">
    <span>✉️</span>
    <div>
        <strong>อีเมล</strong><br>
        <a href="mailto:myemail@gmail.com">myemail@gmail.com</a>
    </div>
</div>

<div class="contact-item">
    <span>📸</span>
    <div>
        <strong>Instagram</strong><br>
        <a href="https://instagram.com/my_instagram" target="_blank">
            @my_instagram
        </a>
    </div>
</div>

<div class="contact-item">
    <span>📘</span>
    <div>
        <strong>Facebook</strong><br>
        <a href="https://facebook.com/MyFacebookName" target="_blank">
            MyFacebook Name
        </a>
    </div>
</div>

<a href="index.html" class="back-btn">
🏠 กลับหน้าหลัก
</a>

</div>

</body>
</html>
