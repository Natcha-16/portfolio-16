<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me 📱</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Kanit'; background-color: #FFF5F5; color: #4A4A4A; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 30px; border: 3px solid #E1A2AD; padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(225, 162, 173, 0.3); text-align: center; }
        h1 { color: #E1A2AD; margin-top: 0; }
        .contact-list { text-align: left; margin: 20px 0; }
        .contact-item { padding: 12px; background: #FFF5F5; border-radius: 15px; margin-bottom: 10px; font-size: 16px; }
        .back-btn { display: inline-block; width: 100%; text-align: center; background: #E1A2AD; color: white; text-decoration: none; padding: 10px 0; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #c98a95; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📱 ช่องทางการติดต่อ</h1>
        
        <div class="contact-list">
            <div class="contact-item">📞 <strong>เบอร์โทร:</strong> 09X-XXXXXXX</div>
            <div class="contact-item">✉️ <strong>อีเมล:</strong> myemail@gmail.com</div>
            <div class="contact-item">📸 <strong>Instagram:</strong> @my_instagram</div>
            <div class="contact-item">📘 <strong>Facebook:</strong> MyFacebook Name</div>
        </div>
        
        <a href="index.html" class="back-btn">🏠 กลับหน้าหลัก</a>
    </div>
</body>
</html>
