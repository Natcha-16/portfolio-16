<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me 👤</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Kanit';
            background:#FFF5F5;
            color:#4A4A4A;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            overflow:hidden;
        }

        .card{
            background:white;
            border-radius:30px;
            border:3px solid #E1A2AD;
            padding:30px;
            width:90%;
            max-width:450px;
            box-shadow:0 10px 25px rgba(225,162,173,.3);
            position:relative;
            z-index:10;
        }

        h1{
            color:#E1A2AD;
            text-align:center;
            margin-bottom:20px;
        }

        .info-group{
            margin-bottom:15px;
            border-bottom:1px dashed #E1A2AD;
            padding-bottom:8px;
        }

        .label{
            font-weight:bold;
            color:#E1A2AD;
        }

        .back-btn{
            display:inline-block;
            width:100%;
            text-align:center;
            background:#E1A2AD;
            color:white;
            text-decoration:none;
            padding:12px 0;
            border-radius:50px;
            margin-top:20px;
            font-weight:bold;
            transition:.3s;
        }

        .back-btn:hover{
            background:#c98a95;
        }

        /* ===========================
           Professional Sakura Effect
        =========================== */

        .sakura{
            position:fixed;
            top:-60px;
            width:18px;
            height:18px;
            background:linear-gradient(135deg,#ffd1dc,#ff9ec7);
            border-radius:60% 40% 60% 40%;
            pointer-events:none;
            user-select:none;
            box-shadow:
                0 0 10px rgba(255,170,200,.6),
                0 0 20px rgba(255,170,200,.35);
            z-index:3;
            animation:fall linear forwards;
        }

        .sakura::before{
            content:"";
            position:absolute;
            width:18px;
            height:18px;
            background:inherit;
            border-radius:60% 40% 60% 40%;
            transform:rotate(55deg);
        }

        @keyframes fall{

            0%{
                transform:translateY(-50px) translateX(0) rotate(0deg);
                opacity:1;
            }

            20%{
                transform:translateY(20vh) translateX(-40px) rotate(120deg);
            }

            40%{
                transform:translateY(40vh) translateX(40px) rotate(240deg);
            }

            60%{
                transform:translateY(60vh) translateX(-35px) rotate(360deg);
            }

            80%{
                transform:translateY(80vh) translateX(35px) rotate(520deg);
            }

            100%{
                transform:translateY(calc(100vh + 100px)) translateX(-20px) rotate(720deg);
                opacity:0;
            }

        }

    </style>
</head>

<body>

    <div class="card">

        <h1>👤 ประวัติส่วนตัว</h1>

        <div class="info-group"><span class="label">ชื่อ-นามสกุล:</span> นาย/นางสาว สมจิต ดีใจ</div>

        <div class="info-group"><span class="label">ชื่อเล่น:</span> มินต์</div>

        <div class="info-group"><span class="label">อายุ:</span> 18 ปี</div>

        <div class="info-group"><span class="label">วันเกิด:</span> 1 มกราคม 2551</div>

        <div class="info-group"><span class="label">กรุ๊ปเลือด:</span> O</div>

        <div class="info-group"><span class="label">แผนการเรียน:</span> วิทยาศาสตร์-คณิตศาสตร์</div>

        <div class="info-group"><span class="label">งานอดิเรก:</span> อ่านหนังสือ, ฟังเพลง, ฝึกเขียนโค้ด</div>

        <div class="info-group"><span class="label">ความใฝ่ฝัน:</span> วิศวกรซอฟต์แวร์ / คณะเทคโนโลยีสารสนเทศ</div>

        <a href="index.html" class="back-btn">🏠 กลับหน้าหลัก</a>

    </div>

    <script>

        function createSakura(){

            const petal = document.createElement("div");

            petal.className = "sakura";

            petal.style.left = Math.random() * window.innerWidth + "px";

            const size = 12 + Math.random() * 12;

            petal.style.width = size + "px";
            petal.style.height = size + "px";

            petal.style.opacity = .5 + Math.random() * .5;

            petal.style.animationDuration = (8 + Math.random() * 6) + "s";

            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 15000);

        }

        setInterval(createSakura,220);

    </script>

</body>
</html>
